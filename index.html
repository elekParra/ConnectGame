<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conecta los números</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h2>🔢 Conecta los números</h2>

    <div id="hud">
        <div id="target">Next: 1</div>
    </div>

    <div id="timerWrap">
        <div id="timerBar"></div>
    </div>

    <div id="gameWrap">
        <canvas id="c"></canvas>
    </div>

    <div class="controls">
        <button onclick="undo()">Deshacer</button>
        <button onclick="restart()">Reiniciar</button>
        <button onclick="generateLevel()">Nuevo nivel</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
