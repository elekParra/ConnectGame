<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Conecta los números</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h2>🔢 Conecta los números</h2>

<div id="hud">
    <div id="target">Next: 1</div>
    <div id="cells">Cells: 0 / 0</div>
    <div id="timer">Time: 0</div>
</div>

<div id="timeBarWrap">
    <div id="timeBar"></div>
</div>

<div id="gameWrap">
    <canvas id="c"></canvas>
</div>

<div class="controls">
    <button onclick="undo()">Deshacer</button>
    <button onclick="restart()">Reiniciar</button>
    <button onclick="generateLevel()">Nuevo nivel</button>
</div>

<script src="script.js"></script>
</body>
</html>
